<div class="page page-solo" id="pg-pengaturan">
  <div class="set-page">
    <div class="set-back" onclick="go('pg-home')">←</div>
    <div class="set-title">Pengaturan</div>
    <div class="set-card">
      <div class="set-field">
        <label class="set-label">Username</label>
        <input class="set-input" id="set-username" type="text" readonly>
        <div class="set-ganti" onclick="go('pg-ganti-nama')">Ganti Username →</div>
      </div>
      <div class="set-div"></div>
      <div class="set-field">
        <label class="set-label">Nama Warung</label>
        <input class="set-input" id="set-warung" type="text" readonly>
        <div class="set-ganti" onclick="go('pg-ganti-warung')">Ganti Nama Warung →</div>
      </div>
      <div class="set-div"></div>
      <div class="set-field">
        <label class="set-label">🎯 Target Pendapatan Bulanan</label>
        <input class="set-input" id="set-target" type="number" inputmode="numeric" placeholder="5000000" style="font-size:15px;">
        <div style="font-size:11px;color:#aaa;margin-top:4px;">Masukkan nominal target per bulan (Rp)</div>
        <button class="set-ganti" style="background:var(--blue);color:white;border:none;border-radius:8px;padding:6px 14px;margin-top:8px;cursor:pointer;font-size:13px;font-weight:600;" onclick="simpanTarget()">Simpan Target →</button>
      </div>
      </div>
    <button class="btn-red-full" style="margin-top:24px;" onclick="doLogout()">Keluar </button>
  </div>
</div>

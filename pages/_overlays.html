<!-- SELECTION POPUP (tahan lama pada item) -->
<div class="sel-overlay" id="sel-overlay" onclick="hideSel()">
  <div class="sel-box" onclick="event.stopPropagation()">
    <button class="sel-btn" onclick="hideSel();go('pg-barang-detail')">
      <div class="sel-icon-circle"><svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div>
      Edit Barang
    </button>
    <button class="sel-btn danger" onclick="konfirmasiHapusBarang()">
      <div class="sel-icon-circle"><svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></div>
      Hapus Barang
    </button>
    <button class="sel-btn" style="background:rgba(80,80,80,.85);" onclick="hideSel()">
      <div class="sel-icon-circle"><svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>
      Abaikan
    </button>
  </div>
</div>

<!-- BAR PLUS (tombol + di katalog) -->
<div class="bar-plus-overlay" id="bar-plus-overlay" onclick="hideBarPlus()">
  <div class="bar-plus-box" onclick="event.stopPropagation()">
    <button class="bp-btn gray" onclick="hideBarPlus();go('pg-tambah-barang')">
      <div class="bp-icon-circle"><svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
      Tambah Barang Baru
    </button>
    <button class="bp-btn red" onclick="hideBarPlus();go('pg-barang-keluar')">
      <div class="bp-icon-circle"><svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>
      Barang Keluar
    </button>
  </div>
</div>

<!-- TOAST -->
<div id="wk-toast" style="position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .25s;white-space:nowrap;max-width:340px;text-align:center;font-family:'Poppins',sans-serif;pointer-events:none;"></div>

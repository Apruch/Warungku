<div class="page" id="pg-mitra" style="display: flex; flex-direction: column; height: 100vh; overflow: hidden;">

  <!-- Header Tetap di Atas -->
  <div class="pg-hdr" style="flex-shrink: 0; background-color: var(--blue); padding-top: 50px; padding-bottom: 40px;">
    <h2 style="color: white; margin-left: 16px;">Sales & Mitra</h2>
    <div class="search-wrap" style="margin-top: 15px; padding: 0 2px;">
      <div class="srch-inner">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input class="srch-input" id="mitra-search" placeholder="Cari Barang..." oninput="renderMitra()">
      </div>
    </div>
  </div>

  <!-- Body List (Fixed, Tidak Bisa Digeser) -->
  <div class="list-body" style="flex: 1; background-color: #f4f5f7; border-radius: 22px 22px 0 0; margin-top: -20px; padding: 25px 16px; overflow: hidden; position: relative; z-index: 2;">
    
    <!-- Filter Hari -->
    <div style="background-color: #ffffff; padding: 16px; border-radius: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
      <div class="day-chips" style="display: flex; flex-direction: column; gap: 12px;">
        <button class="dchip on" style="width: 100%; padding: 12px 0; border-radius: 12px; font-weight: 600;">Hari Ini</button>
        <div style="height: 1px; background-color: #f0f2f5;"></div>
        <div style="display: flex; gap: 3px; justify-content: space-between;">
           <button class="dchip">Senin</button>
           <button class="dchip">Selasa</button>
           <button class="dchip">Rabu</button>
           <button class="dchip">Kamis</button>
           <button class="dchip">Jumat</button>
           <button class="dchip">Sabtu</button>
           <button class="dchip">Minggu</button>
        </div>
      </div>
    </div>

    <div class="mitra-date-label" id="mitra-date-lbl">Hari Ini - <span id="mitra-tanggal"></span></div>
    <div id="mitra-list"></div>
  </div>

  <!-- Tombol Tambah & Navigasi (Harus di sini agar tidak hilang) -->
  <button class="fab" onclick="go('pg-tambah-mitra')">+</button>
  
  <div class="bnav" style="flex-shrink: 0;">
    <!-- Isi bnav kamu di sini (Home, Stok, Scan, Mitra, Laporan) -->
    <div class="ni" onclick="go('pg-home')">...</div>
    <div class="ni on" onclick="go('pg-mitra')">...</div>
    <!-- dst -->
  </div>

</div>

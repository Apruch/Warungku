<div class="page" id="pg-mitra">

  <!-- 1. HEADER (FIXED DI ATAS) -->
  <div class="pg-hdr" style="position: relative; background-color: var(--blue); padding-top: 50px; padding-bottom: 40px; flex-shrink: 0;">
    <h2 style="color: white; margin-left: 16px;">Sales & Mitra</h2>
    
    <div class="search-wrap" style="margin-top: 15px; padding: 0 2px;">
      <div class="srch-inner">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input class="srch-input" id="mitra-search" placeholder="Cari Barang..." oninput="renderMitra()">
      </div>
    </div>
  </div>

  <!-- 2. BODY LIST (BACKGROUND FULL & KUNCI SCROLL) -->
  <!-- Perhatikan overflow: hidden; di bawah ini -->
  <div class="list-body" style="position: relative; z-index: 2; background-color: #f4f5f7; border-radius: 22px 22px 0 0; margin-top: -20px; padding-top: 25px; padding-left: 16px; padding-right: 16px; flex: 1; overflow: hidden; padding-bottom: 120px;">

    <!-- Kotak Filter Hari -->
    <div style="background-color: #ffffff; padding: 16px; border-radius: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
      <div class="day-chips" id="day-chips" style="display: flex; flex-direction: column; gap: 12px;">
        
        <button class="dchip on" onclick="setDay(this,'Hari Ini')" style="width: 100%; padding: 12px 0; border-radius: 12px; font-weight: 600; font-size: 14px; text-align: center;">Hari Ini</button>
        <div style="height: 1px; background-color: #f0f2f5; margin: 2px 0;"></div>

        <div style="display: flex; gap: 3px; justify-content: space-between; width: 100%; padding-bottom: 4px;">
          <button class="dchip" onclick="setDay(this,'Senin')" style="flex: 1; padding: 8px 0; border-radius: 10px; font-size: 11px; font-weight: 600; border: none; text-align: center;">Senin</button>
          <button class="dchip" onclick="setDay(this,'Selasa')" style="flex: 1; padding: 8px 0; border-radius: 10px; font-size: 11px; font-weight: 600; border: none; text-align: center;">Selasa</button>
          <button class="dchip" onclick="setDay(this,'Rabu')" style="flex: 1; padding: 8px 0; border-radius: 10px; font-size: 11px; font-weight: 600; border: none; text-align: center;">Rabu</button>
          <button class="dchip" onclick="setDay(this,'Kamis')" style="flex: 1; padding: 8px 0; border-radius: 10px; font-size: 11px; font-weight: 600; border: none; text-align: center;">Kamis</button>
          <button class="dchip" onclick="setDay(this,'Jumat')" style="flex: 1; padding: 8px 0; border-radius: 10px; font-size: 11px; font-weight: 600; border: none; text-align: center;">Jumat</button>
          <button class="dchip" onclick="setDay(this,'Sabtu')" style="flex: 1; padding: 8px 0; border-radius: 10px; font-size: 11px; font-weight: 600; border: none; text-align: center;">Sabtu</button>
          <button class="dchip" onclick="setDay(this,'Minggu')" style="flex: 1; padding: 8px 0; border-radius: 10px; font-size: 11px; font-weight: 600; border: none; text-align: center;">Minggu</button>
        </div>

      </div>
    </div>

    <!-- Date label -->
    <div class="mitra-date-label" id="mitra-date-lbl">Hari Ini - <span id="mitra-tanggal"></span></div>

    <!-- Mitra list -->
    <div id="mitra-list"></div>

  </div>

  <button class="fab" onclick="showBarPlus()">+</button>

  <div class="bnav">
    <div class="ni" onclick="go('pg-home')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</div>
    <div class="ni on" onclick="go('pg-katalog')"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.72V20c0 1.1 1.1 2 2 2h14c.9 0 2-.9 2-2V8.72c.57-.38 1-.99 1-1.72V4c0-1.1-.9-2-2-2zm-5 12H9v-2h6v2zm5-7H4V4h16v3z"/></svg>Stok</div>
    <div class="ni-scan" onclick="go('pg-scanner')"><div class="ni-scan-btn"><svg viewBox="0 0 24 24"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V13zm1.5 1.5H16V16h-1.5v-1.5zM16 13h1.5v1.5H16V13zm-3 3h1.5v1.5H13V16zm1.5 1.5H16V19h-1.5v-1.5zM16 16h1.5v1.5H16V16zm1.5-1.5H19V16h-1.5v-1.5zm0 3H19V19h-1.5v-1.5zM22 7h-2V4h-3V2h5v5zm0 15v-5h-2v3h-3v2h5zM2 22h5v-2H4v-3H2v5zM2 2v5h2V4h3V2H2z"/></svg></div><span>Scan</span></div>
    <div class="ni" onclick="go('pg-mitra')"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>Mitra</div>
    <div class="ni" onclick="go('pg-laporan')"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>Laporan</div>
  </div>
</div>

<div class="page page-solo" id="pg-edit-mitra">
  <div class="form-page-top"></div>
  <div class="form-card">
    <div class="form-title">Edit Data Mitra</div>
    <div class="form-divider"></div>
    <label class="form-label">Nama Toko / Perusahaan</label>
    <input class="form-input" id="em-toko" type="text">
    <label class="form-label">Nama Sales</label>
    <input class="form-input" id="em-sales" type="text">
    <label class="form-label">No. WhatsApp</label>
    <input class="form-input" id="em-wa" type="tel">
    <label class="form-label">Alamat</label>
    <textarea class="form-input area" id="em-alamat"></textarea>
    <div class="form-grid">
      <div>
        <label class="form-label">Hari Kunjungan</label>
        <select class="form-input" id="em-hari" style="padding:12px 10px;">
          <option value="">Pilih Hari</option>
          <option>Senin</option><option>Selasa</option><option>Rabu</option>
          <option>Kamis</option><option>Jumat</option><option>Sabtu</option><option>Minggu</option>
        </select>
      </div>
      <div>
        <label class="form-label">Tgl Kedatangan</label>
        <input class="form-input" id="em-tgl" type="date" style="padding:12px 10px;">
      </div>
    </div>
    <div class="form-btn-row">
      <button class="btn-gray" onclick="go('pg-profil-mitra')">Batal</button>
      <button class="btn-green-half" onclick="simpanEditMitra()">Simpan</button>
    </div>
  </div>
</div>

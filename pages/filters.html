<div class="page page-solo" id="pg-filters">
  <div class="filters-page">
    <div style="text-align:left;margin-bottom:4px;">
      <span style="font-size:22px;cursor:pointer;" onclick="go('pg-katalog')">←</span>
    </div>
    <div class="filters-title">Filter Katalog</div>

    <!-- GRUP 1: KATEGORI (Menggunakan toggleFOpt) -->
    <div class="f-section">Kategori</div>
    <div class="f-group" id="filter-kategori">
      <div class="f-options">
        <button class="f-opt" onclick="toggleFOpt(this)">Makanan</button>
        <button class="f-opt" onclick="toggleFOpt(this)">Minuman</button>
        <button class="f-opt" onclick="toggleFOpt(this)">Rokok</button>
        <button class="f-opt" onclick="toggleFOpt(this)">Snack</button>
      </div>
    </div>

    <!-- GRUP 2: STOK (Menggunakan selectFOpt) -->
    <div class="f-section">Status Stok</div>
    <div class="f-group" id="filter-stok">
      <div class="f-options">
        <button class="f-opt" onclick="selectFOpt(this, 'filter-stok')">Terbanyak</button>
        <button class="f-opt" onclick="selectFOpt(this, 'filter-stok')">Tersedikit</button>
      </div>
    </div>

    <!-- GRUP 3: HARGA (Menggunakan selectFOpt) -->
    <div class="f-section">Urutkan Harga</div>
    <div class="f-group" id="filter-harga">
      <div class="f-options">
        <button class="f-opt" onclick="selectFOpt(this, 'filter-harga')">Termurah</button>
        <button class="f-opt" onclick="selectFOpt(this, 'filter-harga')">Termahal</button>
      </div>
    </div>

    <!-- TOMBOL AKSI -->
    <button class="btn-blue" onclick="applyFilter()">Terapkan Filter</button>
    <button style="background:var(--gray-input);color:var(--text);border:none;border-radius:14px;padding:14px;width:100%;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;" onclick="resetFilter()">Reset</button>
  </div>
</div>

<div class="page" id="pg-scanner" style="background:#EEEEF5;flex-direction:column;">

  <!-- Header -->
  <div style="padding:32px 22px 16px;flex-shrink:0;">
    <div style="font-size:16px;font-weight:700;color:#1A1A2E;">Scanner</div>
  </div>

  <!-- Main scan area -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px 16px;">

    <!-- Title -->
    <div style="font-size:20px;font-weight:700;color:#1A1A2E;margin-bottom:20px;">Scan Barcode</div>

    <!-- Camera / viewfinder box -->
    <div style="width:100%;max-width:300px;aspect-ratio:1/1;background:#fff;border-radius:16px;overflow:hidden;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.08);">
      <video id="scan-video" autoplay playsinline muted
        style="width:100%;height:100%;object-fit:cover;display:block;background:#f0f0f0;"></video>

      <!-- Scan line animation -->
      <div id="scan-line-anim" style="position:absolute;left:10%;width:80%;height:2.5px;background:rgba(100,114,243,.85);top:20%;box-shadow:0 0 8px #6472F3;animation:scanAnim 2s ease-in-out infinite;border-radius:2px;"></div>

      <!-- Corner markers -->
      <div style="position:absolute;top:14px;left:14px;width:28px;height:28px;border-top:3px solid #6472F3;border-left:3px solid #6472F3;border-radius:4px 0 0 0;"></div>
      <div style="position:absolute;top:14px;right:14px;width:28px;height:28px;border-top:3px solid #6472F3;border-right:3px solid #6472F3;border-radius:0 4px 0 0;"></div>
      <div style="position:absolute;bottom:14px;left:14px;width:28px;height:28px;border-bottom:3px solid #6472F3;border-left:3px solid #6472F3;border-radius:0 0 0 4px;"></div>
      <div style="position:absolute;bottom:14px;right:14px;width:28px;height:28px;border-bottom:3px solid #6472F3;border-right:3px solid #6472F3;border-radius:0 0 4px 0;"></div>
    </div>

    <!-- Status text -->
    <div id="scan-status" style="font-size:13px;color:#888;text-align:center;margin-top:20px;line-height:1.6;padding:0 16px;">Letakkan barcode di tengah bingkai yang<br>akan dipindai.</div>

    <!-- Torch button -->
    <button id="scan-torch-btn" onclick="toggleTorch()"
      style="margin-top:20px;width:52px;height:52px;border-radius:50%;background:#6472F3;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(100,114,243,.4);">
      <span style="font-size:22px;">🔦</span>
    </button>
  </div>

  <!-- Manual input (hidden by default, shown if needed) -->
  <canvas id="scan-canvas" style="display:none;"></canvas>

  <!-- Result card overlay -->
  <div id="scan-result-card" style="display:none;position:absolute;bottom:90px;left:16px;right:16px;background:#fff;border-radius:20px;padding:20px 20px 24px;z-index:30;box-shadow:0 8px 30px rgba(0,0,0,.15);">
    <div style="font-size:10px;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;">Barcode Terdeteksi</div>
    <div id="scan-result-barcode" style="font-size:18px;font-weight:800;color:#1A1A2E;margin-bottom:4px;font-family:monospace;word-break:break-all;"></div>
    <div id="scan-result-nama" style="font-size:13px;color:#555;margin-bottom:16px;"></div>
    <div id="scan-result-actions" style="display:flex;flex-direction:column;gap:8px;"></div>
    <button onclick="tutupScanResult()" style="width:100%;margin-top:8px;background:#f0f0f0;border:none;border-radius:12px;padding:11px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:#555;">Scan Lagi</button>
  </div>

  <!-- Manual entry bar at very bottom above nav -->
  <div style="padding:10px 16px 12px;flex-shrink:0;background:rgba(238,238,245,.95);">
    <div style="display:flex;gap:8px;">
      <input id="scan-manual-input" type="text" inputmode="numeric" placeholder="Ketik barcode manual..."
        style="flex:1;border:1.5px solid #ddd;border-radius:12px;padding:11px 14px;font-family:'Poppins',sans-serif;font-size:13px;outline:none;background:#fff;color:#1A1A2E;"
        onkeydown="if(event.key==='Enter') cariBarcode(this.value)">
      <button onclick="cariBarcode(document.getElementById('scan-manual-input').value)"
        style="background:#6472F3;color:#fff;border:none;border-radius:12px;padding:11px 18px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;font-size:13px;white-space:nowrap;">Cari</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bnav">
    <div class="ni" onclick="stopScanner();go('pg-home')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</div>
    <div class="ni" onclick="stopScanner();go('pg-katalog')"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.72V20c0 1.1 1.1 2 2 2h14c.9 0 2-.9 2-2V8.72c.57-.38 1-.99 1-1.72V4c0-1.1-.9-2-2-2zm-5 12H9v-2h6v2zm5-7H4V4h16v3z"/></svg>Stok</div>
    <div class="ni-scan on" style="color:var(--blue);" onclick="go('pg-scanner')">
      <div class="ni-scan-btn"><svg viewBox="0 0 24 24"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V13zm1.5 1.5H16V16h-1.5v-1.5zM16 13h1.5v1.5H16V13zm-3 3h1.5v1.5H13V16zm1.5 1.5H16V19h-1.5v-1.5zM16 16h1.5v1.5H16V16zm1.5-1.5H19V16h-1.5v-1.5zm0 3H19V19h-1.5v-1.5zM22 7h-2V4h-3V2h5v5zm0 15v-5h-2v3h-3v2h5zM2 22h5v-2H4v-3H2v5zM2 2v5h2V4h3V2H2z"/></svg></div>
      <span>Scan</span>
    </div>
    <div class="ni" onclick="stopScanner();go('pg-mitra')"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>Mitra</div>
    <div class="ni" onclick="stopScanner();go('pg-laporan')"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>Laporan</div>
  </div>
</div>

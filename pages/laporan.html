<div class="page" id="pg-laporan">

  <div class="page-scroll">


     <div class="lap-hdr" style="padding-top: 50px; padding-bottom: 30px;"> </div>
      <div class="lap-body" style="border-radius:22px 22px 0 0;margin-top:-15px;">

        <div style="font-size: 12px; font-weight: 600; color: #555555; margin-bottom: 12px; margin-left: 4px;">
      Laporan Warung Anda
    </div>

    <div class="rpt-card">
      <div class="rpt-hdr">
        <h3>Ringkasan Mingguan</h3>
        <span class="wh-lnk" onclick="go('pg-tutup-toko')">Tutup Toko</span>
      </div>
      <div class="rpt-amt" id="lap-total-minggu">Rp 0</div>
      <div class="rpt-lbl" id="lap-total-lbl">Total pendapatan 7 hari terakhir</div>
      <div class="prog-bar"><div class="prog-fill" id="lap-prog-fill" style="width:0%"></div></div>
      <div class="prog-lbl" id="lap-prog-lbl">Menghitung...</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
      <div style="background:#fff;border-radius:14px;padding:12px;text-align:center;">
        <div style="font-size:18px;font-weight:800;color:var(--blue);" id="lap-stat-hari">0</div>
        <div style="font-size:10px;color:#999;margin-top:2px;">Hari Aktif</div>
      </div>
      <div style="background:#fff;border-radius:14px;padding:12px;text-align:center;">
        <div style="font-size:18px;font-weight:800;color:var(--green);" id="lap-stat-items">0</div>
        <div style="font-size:10px;color:#999;margin-top:2px;">Item Terjual</div>
      </div>
      <div style="background:#fff;border-radius:14px;padding:12px;text-align:center;">
        <div style="font-size:18px;font-weight:800;color:var(--orange);" id="lap-stat-avg">Rp 0</div>
        <div style="font-size:10px;color:#999;margin-top:2px;">Rata-rata/Hari</div>
      </div>
    </div>

    <div style="background:#fff;border-radius:18px;padding:14px 16px;margin-bottom:14px;">
      <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;">Grafik 7 Hari Terakhir</div>
      <div id="lap-weekly-chart" style="display:flex;align-items:flex-end;gap:6px;height:100px;"></div>
      <div id="lap-weekly-labels" style="display:flex;gap:6px;margin-top:6px;"></div>
    </div>

   
    <div class="tab-row" id="lap-tabs" style="justify-content:center;margin: bottom 5px;">
      <button class="tab on" onclick="setLapTab(this,'lap-pendapatan')">Pendapatan</button>
      <button class="tab" onclick="setLapTab(this,'lap-stok')">Stok Barang</button>
      <button class="tab" onclick="setLapTab(this,'lap-mutasi')">Mutasi</button>
    </div>
    

    <div id="lap-pendapatan"></div>
    <div id="lap-stok" style="display:none;"></div>
    <div id="lap-mutasi" style="display:none;"></div>
  </div>

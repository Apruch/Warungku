<div class="page page-solo" id="pg-login">
  <div class="auth-top" style="padding-top:80px; padding-bottom:72px;">
    <div class="auth-logo-big">Warung<em>Ku!</em></div>
    <div class="auth-top-tagline">Asisten Terbaik Warung Anda!</div>
  </div>
  <div class="auth-card">
    <div class="auth-link-row">
      <div>
        <div class="auth-big-title">Login</div>
        <div class="auth-sub">Silahkan login ke akun WarungKu<br>yang sudah terdaftar.</div>
      </div>
      <span class="lnk" onclick="go('pg-signup')">Daftar</span>
    </div>
    <div id="login-err" style="display:none;background:#FEE2E2;color:#C0392B;border-radius:10px;padding:10px 12px;font-size:12px;margin-bottom:10px;"></div>
    <div class="inp-wrap">
      <span class="inp-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></span>
      <input class="inp" id="login-username" type="text" placeholder="Username WarungID...">
    </div>
    <div class="inp-wrap">
      <span class="inp-icon"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/></svg></span>
      <input class="inp" id="login-password" type="password" placeholder="Password...">
      <span class="inp-right lnk" style="font-size:12px;" onclick="bukaLupaSandi()">Lupa?</span>
    </div>
    <button class="btn-blue" onclick="doLogin()">Login</button>
    <div style="text-align:center;margin-top:20px;">
      <span style="font-size:12px;color:#aaa;">Belum punya akun? </span>
      <span class="lnk" onclick="go('pg-signup')">Daftar Sekarang</span>
    </div>
  </div>
</div>

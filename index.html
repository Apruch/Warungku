<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarungKu — Asisten Terbaik Warung Anda</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
</head>
<body>

<div class="phone">
  <div class="screen" id="screen">
    <div id="app-loading" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#567EEC;">
      
      <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;"></div>
      
    </div>
  </div>
</div>

<style>
@keyframes spin{to{transform:rotate(360deg);}}
</style>

<script>
// ═══════════════════════════════════════════════════════
// PAGE LOADER — fetch semua halaman lalu inject ke screen
// ═══════════════════════════════════════════════════════
var PAGE_FILES = [
  'pages/splash.html',
  'pages/login.html',
  'pages/signup.html',
  'pages/data-pengguna.html',
  'pages/login-sukses.html',
  'pages/lupa-sandi.html',
  'pages/daftar-sukses.html',
  'pages/home.html',
  'pages/katalog.html',
  'pages/barang-detail.html',
  'pages/info-barang.html',
  'pages/tambah-barang.html',
  'pages/barang-masuk.html',
  'pages/barang-keluar.html',
  'pages/filters.html',
  'pages/laporan.html',
  'pages/mitra.html',
  'pages/profil-mitra.html',
  'pages/tambah-mitra.html',
  'pages/edit-mitra.html',
  'pages/pengaturan.html',
  'pages/ganti-nama.html',
  'pages/ganti-warung.html',
  'pages/scanner.html',
  'pages/tutup-toko.html',
  'pages/_overlays.html'
];

function loadPages(){
  var screen = document.getElementById('screen');
  var promises = PAGE_FILES.map(function(url){
    return fetch(url)
      .then(function(r){
        if(!r.ok) throw new Error('Gagal load: '+url);
        return r.text();
      })
      .then(function(html){
        var wrapper = document.createElement('div');
        wrapper.innerHTML = html;
        while(wrapper.firstChild){
          screen.appendChild(wrapper.firstChild);
        }
      });
  });

  Promise.all(promises).then(function(){
    // Semua halaman sudah di-inject, hapus loading screen
    var loading = document.getElementById('app-loading');
    if(loading) loading.remove();

    // Load scripts
    loadScript('js/db.js', function(){
      loadScript('js/app.js', function(){
        // App siap — jalankan init
        if(typeof appInit === 'function') appInit();
      });
    });
  }).catch(function(err){
    console.error('Load error:', err);
    var loading = document.getElementById('app-loading');
    if(loading){
      loading.innerHTML = '<div style="color:#fff;font-size:14px;padding:20px;text-align:center;">'+
        '❌ Gagal memuat halaman.<br><br>'+
        'Pastikan file dijalankan melalui web server lokal.<br>'+
        '<small style="opacity:.7">Gunakan: python3 -m http.server 8080</small>'+
        '</div>';
    }
  });
}

function loadScript(src, cb){
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = function(){ console.error('Script gagal:', src); cb && cb(); };
  document.head.appendChild(s);
}

// Jalankan setelah DOM siap
document.addEventListener('DOMContentLoaded', loadPages);
</script>
</body>
</html>
